{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <div class="text-center mb-8">
        <div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4" style="background: var(--primary-dark);">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#E8F0FE" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </div>
        <h1 class="text-2xl font-extrabold tracking-tight">Settings</h1>
        <p class="text-sm mt-1" style="color: var(--text-muted);">Manage your account preferences</p>
    </div>

    <div class="card p-6 mb-6">
        <h3 class="font-bold mb-4 flex items-center gap-2">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
            Profile Visibility
        </h3>
        <form method="POST" class="space-y-4">
            <select name="visibility" class="input-field">
                <option value="public" {% if current_user.profile_visibility == 'public' %}selected{% endif %}>Public</option>
                <option value="private" {% if current_user.profile_visibility == 'private' %}selected{% endif %}>Private</option>
            </select>
            <button type="submit" class="btn-primary flex items-center gap-2">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Save Settings
            </button>
        </form>
    </div>

    <div class="card p-6">
        <h3 class="font-bold mb-4 flex items-center gap-2">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            Change Password
        </h3>
        <form method="POST" action="{{ url_for('auth.change_password', _external=False) }}" class="space-y-4">
            <div>
                <label class="label">Current Password</label>
                <input type="password" name="current_password" required class="input-field">
            </div>
            <div>
                <label class="label">New Password</label>
                <input type="password" name="new_password" required minlength="6" class="input-field">
            </div>
            <div>
                <label class="label">Confirm New Password</label>
                <input type="password" name="confirm_password" required class="input-field">
            </div>
            <button type="submit" class="btn-primary flex items-center gap-2">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                Update Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
