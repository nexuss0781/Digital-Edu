<div id="{{ container_id }}" class="grid grid-cols-1 lg:grid-cols-2 gap-4 mt-6">
    <div class="space-y-4">
        <div class="card p-5">
            <h4 class="font-bold mb-3 flex items-center gap-2" style="color: var(--primary-dark);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                Requirements
            </h4>
            <div class="space-y-2">
                {% for req in requirements %}
                <div class="flex items-center gap-2.5 p-2.5 rounded-lg" style="background: var(--bg); border: 1px solid var(--border);">
                    <span class="req-status-{{ loop.index0 }} shrink-0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg></span>
                    <span class="text-sm">{{ req.requirement }}</span>
                    <button class="check-req-{{ loop.index0 }} ml-auto px-3 py-1 rounded-md text-xs font-semibold shrink-0" style="background: var(--c4); color: var(--c1);">Check</button>
                </div>
                <div class="req-hint-{{ loop.index0 }} text-xs ml-7" style="color: var(--error); display: none;"></div>
                {% endfor %}
            </div>
        </div>
        <button class="goal-view-btn btn-secondary text-sm w-full">Show Goal</button>
    </div>
    <div class="space-y-4">
        <div id="{{ container_id }}-editor" style="height: 350px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden;"></div>
        <div class="flex gap-2">
            <button class="live-view-btn btn-primary text-sm">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="inline mr-1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                Run Preview
            </button>
        </div>
        <iframe class="preview-frame w-full rounded-lg" style="height: 350px; border: 1px solid var(--border); background: var(--bg-card);"></iframe>
    </div>
</div>
